{% extends 'base.html' %}
{% block content %}
<section class="panel narrow">
  <h1>Forgot Password</h1>
  <p class="helper-text">Enter your account email and we will send a reset link.</p>
  <p class="helper-text">Check inbox, spam, and junk. If you do not receive it within 30 minutes to 2 hours, email {{ support_email }} and we will help you.</p>
  <form method="post" class="stack">
    <label>Email
      <input name="email" type="email" autocomplete="email" required>
    </label>
    <button class="btn btn-primary" type="submit">Send Reset Link</button>
  </form>
</section>
{% endblock %}
