{% extends 'base.html' %}
{% block content %}
<section class="panel narrow">
  <h1>Create Account</h1>
  <form method="post" class="stack">
    <label>Email
      <input name="email" type="email" autocomplete="email" required>
    </label>
    <label>Username
      <input name="username" minlength="3" maxlength="32" autocomplete="username" required>
    </label>
    <label>Password
      <input name="password" type="password" minlength="7" required>
    </label>
    <p class="helper-text">Password must be longer than 6 characters and include at least one letter, one number, and one symbol (like ! @ #).</p>
    <button class="btn btn-primary" type="submit">Register</button>
  </form>
</section>
{% endblock %}
