{% extends 'base.html' %}
{% block content %}
<section class="panel narrow">
  <h1>Reset Password</h1>
  <form method="post" class="stack">
    <label>New Password
      <input name="password" type="password" minlength="7" autocomplete="new-password" required>
    </label>
    <label>Confirm New Password
      <input name="password_confirm" type="password" minlength="7" autocomplete="new-password" required>
    </label>
    <p class="helper-text">Password must be longer than 6 characters and include at least one letter, one number, and one symbol (like ! @ #).</p>
    <button class="btn btn-primary" type="submit">Update Password</button>
  </form>
</section>
{% endblock %}
